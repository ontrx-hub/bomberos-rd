<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cuerpo de Bomberos — República Dominicana</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">

  <style>
    :root {
      --red:       #C8102E;
      --red-dark:  #8B0000;
      --red-glow:  #FF1A3C;
      --gold:      #F5A623;
      --black:     #0D0D0D;
      --panel-bg:  rgba(13,13,13,0.92);
      --text:      #F0E8E0;
      --text-dim:  #A09090;
      --border:    #3A1A1A;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Barlow', sans-serif;
      background: var(--black);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ─── HEADER ─── */
    header {
      position: relative;
      z-index: 1000;
      background: linear-gradient(135deg, var(--red-dark) 0%, var(--red) 60%, #A00020 100%);
      padding: 0 1.5rem;
      height: 62px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 3px 20px rgba(200,16,46,0.6);
      flex-shrink: 0;
    }
    header::before {
      content: '';
      position: absolute; inset: 0;
      background: repeating-linear-gradient(
        90deg,
        transparent,
        transparent 40px,
        rgba(255,255,255,0.03) 40px,
        rgba(255,255,255,0.03) 41px
      );
      pointer-events: none;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header-emblem {
      width: 42px; height: 42px;
      background: var(--black);
      border-radius: 50%;
      border: 2px solid var(--gold);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem;
      box-shadow: 0 0 12px rgba(245,166,35,0.4);
      flex-shrink: 0;
    }
    .header-title {
      display: flex;
      flex-direction: column;
      line-height: 1;
    }
    .header-title span:first-child {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.1rem, 3vw, 1.5rem);
      letter-spacing: 0.08em;
      color: #fff;
    }
    .header-title span:last-child {
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      color: var(--gold);
      text-transform: uppercase;
      opacity: 0.9;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .mode-btn {
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.25);
      color: #fff;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-family: 'Barlow', sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .mode-btn:hover { background: rgba(200,16,46,0.6); border-color: var(--red-glow); }
    .mode-btn.active { background: var(--red-dark); border-color: var(--gold); color: var(--gold); }

    /* ─── MAIN LAYOUT ─── */
    main {
      flex: 1;
      display: flex;
      overflow: hidden;
      position: relative;
    }

    /* ─── MAP ─── */
    #map {
      flex: 1;
      z-index: 1;
    }

    /* Leaflet attribution tweak */
    .leaflet-control-attribution {
      font-size: 9px;
      background: rgba(0,0,0,0.6) !important;
      color: #aaa !important;
    }
    .leaflet-control-attribution a { color: #ccc !important; }

    /* ─── SIDE PANEL ─── */
    #panel {
      position: absolute;
      top: 0; right: 0;
      height: 100%;
      width: 340px;
      background: var(--panel-bg);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
      z-index: 500;
      backdrop-filter: blur(12px);
    }
    #panel.open { transform: translateX(0); }

    .panel-close {
      position: absolute;
      top: 10px; left: -40px;
      width: 34px; height: 34px;
      background: var(--red);
      border: none;
      border-radius: 4px 0 0 4px;
      color: #fff;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    .panel-close:hover { background: var(--red-dark); }

    .panel-photo {
      position: relative;
      height: 190px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .panel-photo img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }
    .panel-photo::after {
      content: '';
      position: absolute; inset: 0;
      border: 5px solid var(--red);
      pointer-events: none;
      box-shadow: inset 0 0 20px rgba(200,16,46,0.5);
    }
    .photo-placeholder {
      width: 100%; height: 100%;
      background: linear-gradient(135deg, #1a0000 0%, #2a0808 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: 4rem;
      color: var(--red);
      opacity: 0.7;
    }

    .panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 1.2rem;
    }
    .panel-body::-webkit-scrollbar { width: 4px; }
    .panel-body::-webkit-scrollbar-track { background: transparent; }
    .panel-body::-webkit-scrollbar-thumb { background: var(--red); border-radius: 2px; }

    .station-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      letter-spacing: 0.05em;
      line-height: 1;
      color: #fff;
      margin-bottom: 4px;
    }
    .station-number {
      display: inline-block;
      background: var(--red);
      color: #fff;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 2px;
      margin-bottom: 1rem;
    }

    .info-grid {
      display: grid;
      gap: 0.7rem;
      margin-bottom: 1rem;
    }
    .info-row {
      display: grid;
      grid-template-columns: 28px 1fr;
      gap: 8px;
      align-items: start;
    }
    .info-icon {
      width: 28px; height: 28px;
      background: rgba(200,16,46,0.15);
      border: 1px solid rgba(200,16,46,0.3);
      border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .info-content label {
      display: block;
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-dim);
      margin-bottom: 1px;
    }
    .info-content span {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text);
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 0.8rem 0;
    }

    .units-section h3 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 0.08em;
      color: var(--gold);
      margin-bottom: 0.6rem;
    }
    .units-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.5rem;
    }
    .unit-card {
      background: rgba(200,16,46,0.08);
      border: 1px solid rgba(200,16,46,0.2);
      border-radius: 4px;
      padding: 8px 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .unit-icon { font-size: 1.1rem; }
    .unit-info { font-size: 0.75rem; line-height: 1.3; }
    .unit-info strong { display: block; color: #fff; font-weight: 700; }
    .unit-info span { color: var(--text-dim); }

    /* Edit mode button */
    .edit-btn {
      width: 100%;
      margin-top: 0.8rem;
      padding: 8px;
      background: transparent;
      border: 1px dashed var(--border);
      border-radius: 4px;
      color: var(--text-dim);
      font-family: 'Barlow', sans-serif;
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }
    .edit-btn:hover { border-color: var(--gold); color: var(--gold); background: rgba(245,166,35,0.05); }

    /* ─── LEGEND ─── */
    #legend {
      position: absolute;
      bottom: 24px;
      left: 16px;
      z-index: 400;
      background: var(--panel-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px 14px;
      backdrop-filter: blur(10px);
      min-width: 170px;
    }
    #legend h4 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      color: var(--gold);
      margin-bottom: 8px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-bottom: 5px;
    }
    .legend-dot {
      width: 14px; height: 14px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ─── CUSTOM MARKERS ─── */
    .fire-marker {
      width: 36px; height: 36px;
      background: var(--red);
      border: 2.5px solid #fff;
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 3px 10px rgba(200,16,46,0.7);
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .fire-marker:hover, .fire-marker.selected {
      box-shadow: 0 0 0 3px rgba(200,16,46,0.5), 0 3px 14px rgba(200,16,46,0.9);
    }
    .fire-marker .marker-inner {
      transform: rotate(45deg);
      font-size: 1rem;
      margin-top: -2px;
    }
    .cistern-marker {
      width: 30px; height: 30px;
      background: #1565C0;
      border: 2.5px solid #fff;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 8px rgba(21,101,192,0.7);
      font-size: 0.9rem;
      cursor: pointer;
    }

    /* ─── EDIT MODE OVERLAY ─── */
    #edit-toolbar {
      position: absolute;
      top: 14px; left: 50%;
      transform: translateX(-50%);
      z-index: 600;
      background: var(--panel-bg);
      border: 1px solid var(--gold);
      border-radius: 6px;
      padding: 8px 16px;
      display: none;
      align-items: center;
      gap: 10px;
      backdrop-filter: blur(10px);
      white-space: nowrap;
    }
    #edit-toolbar.show { display: flex; }
    #edit-toolbar span {
      font-size: 0.75rem;
      color: var(--gold);
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .tb-btn {
      background: rgba(200,16,46,0.2);
      border: 1px solid var(--red);
      color: #fff;
      padding: 5px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-family: 'Barlow', sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transition: all 0.2s;
    }
    .tb-btn:hover, .tb-btn.active { background: var(--red); }
    .tb-btn.cistern { border-color: #1565C0; background: rgba(21,101,192,0.2); }
    .tb-btn.cistern:hover, .tb-btn.cistern.active { background: #1565C0; }

    /* ─── MODAL (edit units) ─── */
    #modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 2000;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    #modal-overlay.show { display: flex; }
    #modal {
      background: #1a0505;
      border: 1px solid var(--red);
      border-radius: 8px;
      padding: 1.5rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 10px 40px rgba(200,16,46,0.3);
    }
    #modal h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      letter-spacing: 0.06em;
      color: var(--gold);
      margin-bottom: 1rem;
    }
    .modal-field { margin-bottom: 0.8rem; }
    .modal-field label {
      display: block;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      margin-bottom: 4px;
    }
    .modal-field input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      font-size: 0.875rem;
      padding: 7px 10px;
      outline: none;
      transition: border-color 0.2s;
    }
    .modal-field input:focus { border-color: var(--red); }
    .modal-actions { display: flex; gap: 8px; margin-top: 1rem; }
    .modal-actions button {
      flex: 1;
      padding: 9px;
      border: none;
      border-radius: 4px;
      font-family: 'Barlow', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .modal-actions .save-btn { background: var(--red); color: #fff; }
    .modal-actions .cancel-btn { background: #333; color: var(--text-dim); }
    .modal-actions button:hover { opacity: 0.85; }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 640px) {
      #panel { width: 100%; border-left: none; border-top: 1px solid var(--border); }
      #panel.open { transform: translateX(0); }
      .panel-close { left: auto; right: 10px; top: 10px; border-radius: 4px; }
      #legend { bottom: 12px; left: 10px; padding: 8px 10px; }
      .header-right .mode-btn span { display: none; }
    }
  </style>
</head>
<body>

<!-- ══════════ HEADER ══════════ -->
<header>
  <div class="header-left">
    <div class="header-emblem">🔥</div>
    <div class="header-title">
      <span>Cuerpo de Bomberos RD</span>
      <span>Sistema Nacional de Estaciones &amp; Cobertura</span>
    </div>
  </div>
  <div class="header-right">
    <button class="mode-btn" id="btn-edit" onclick="toggleEditMode()">✏️ <span>Editar</span></button>
    <button class="mode-btn" id="btn-add-cistern" onclick="toggleCisternMode()" style="display:none">💧 Cisterna</button>
  </div>
</header>

<!-- ══════════ MAIN ══════════ -->
<main>
  <div id="map"></div>

  <!-- Edit toolbar (shown in edit mode) -->
  <div id="edit-toolbar">
    <span>⚠ Modo Edición</span>
    <button class="tb-btn active" id="tb-station" onclick="setAddMode('station')">🚒 Añadir Estación</button>
    <button class="tb-btn cistern" id="tb-cistern" onclick="setAddMode('cistern')">💧 Añadir Cisterna</button>
    <button class="tb-btn" style="border-color:#888;background:rgba(100,100,100,0.2)" onclick="toggleEditMode()">✕ Salir</button>
  </div>

  <!-- Side Panel -->
  <div id="panel">
    <button class="panel-close" onclick="closePanel()">✕</button>
    <div class="panel-photo" id="panel-photo">
      <div class="photo-placeholder">🚒</div>
    </div>
    <div class="panel-body">
      <div class="station-name" id="panel-name">—</div>
      <div class="station-number" id="panel-number">—</div>

      <div class="info-grid" id="panel-info"></div>

      <div class="divider"></div>

      <div class="units-section">
        <h3>Unidades de Combate</h3>
        <div class="units-grid" id="panel-units"></div>
        <button class="edit-btn" id="panel-edit-btn" onclick="openEditModal()">✏️ Editar unidades</button>
      </div>
    </div>
  </div>

  <!-- Legend -->
  <div id="legend">
    <h4>Leyenda</h4>
    <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div> Cuerpo de Bomberos</div>
    <div class="legend-item"><div class="legend-dot" style="background:#1565C0"></div> Cisterna Voluntaria</div>
    <div class="legend-item"><div class="legend-dot" style="background:rgba(200,16,46,0.25);border:2px solid var(--red);border-radius:2px;width:18px;height:12px;flex-shrink:0"></div> Zona de Cobertura</div>
  </div>
</main>

<!-- ══════════ EDIT MODAL ══════════ -->
<div id="modal-overlay">
  <div id="modal">
    <h2>✏️ Editar Unidades</h2>
    <div id="modal-fields"></div>
    <div class="modal-actions">
      <button class="cancel-btn" onclick="closeModal()">Cancelar</button>
      <button class="save-btn" onclick="saveUnits()">Guardar</button>
    </div>
  </div>
</div>

<!-- Leaflet JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

    lat: 18.2091, lng: -71.0998,
    photo: null,
    units: { "Autobombas": 2, "Rescate": 1 },
    coverage: [
      [18.270, -71.170], [18.270, -71.030], [18.155, -71.030],
      [18.155, -71.170], [18.270, -71.170]
    ]
  }
];

const cisterns = [
  { id: 'c1', lat: 18.482, lng: -69.910, owner: "Sr. Juan García", volume: "20,000 L", phone: "(809) 700-0001", note: "Disponible 24/7" },
  { id: 'c2', lat: 19.460, lng: -70.700, owner: "Empresa Aguas Norte", volume: "50,000 L", phone: "(809) 700-0002", note: "Lunes–Sábado" },
  { id: 'c3', lat: 18.430, lng: -68.980, owner: "Hacienda Romana", volume: "30,000 L", phone: "(809) 700-0003", note: "Previa coordinación" }
];

// ══════════════════════════════════════════
// MAP INIT
// ══════════════════════════════════════════
const map = L.map('map', {
  center: [18.9, -70.1],
  zoom: 8,
  zoomControl: true
});

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
  maxZoom: 19
}).addTo(map);

// ── State ──
let activeStation = null;
let activeZoneLayer = null;
let editMode = false;
let addMode = 'station'; // 'station' | 'cistern'

// ══════════════════════════════════════════
// CUSTOM ICONS
// ══════════════════════════════════════════
function makeFireIcon(selected = false) {
  return L.divIcon({
    className: '',
    html: `<div class="fire-marker${selected ? ' selected' : ''}"><div class="marker-inner">🚒</div></div>`,
    iconSize: [36, 36],
    iconAnchor: [18, 36],
    popupAnchor: [0, -38]
  });
}

function makeCisternIcon() {
  return L.divIcon({
    className: '',
    html: `<div class="cistern-marker">💧</div>`,
    iconSize: [30, 30],
    iconAnchor: [15, 15]
  });
}

// ══════════════════════════════════════════
// RENDER MARKERS
// ══════════════════════════════════════════
const markerMap = {};

stations.forEach(s => {
  const marker = L.marker([s.lat, s.lng], { icon: makeFireIcon() }).addTo(map);
  markerMap[s.id] = marker;
  marker.on('click', () => selectStation(s));
});

cisterns.forEach(c => {
  const marker = L.marker([c.lat, c.lng], { icon: makeCisternIcon() }).addTo(map);
  marker.bindPopup(`
    <div style="font-family:'Barlow',sans-serif;min-width:180px">
      <strong style="color:#1565C0">💧 Cisterna Voluntaria</strong><br>
      <b>Propietario:</b> ${c.owner}<br>
      <b>Capacidad:</b> ${c.volume}<br>
      <b>Contacto:</b> ${c.phone}<br>
      <i style="color:#777">${c.note}</i>
    </div>
  `);
});

// ══════════════════════════════════════════
// SELECT STATION
// ══════════════════════════════════════════
function selectStation(s) {
  // Reset previous marker icon
  if (activeStation) {
    markerMap[activeStation.id].setIcon(makeFireIcon(false));
  }
  // Highlight current marker
  markerMap[s.id].setIcon(makeFireIcon(true));
  activeStation = s;

  // Coverage zone
  if (activeZoneLayer) map.removeLayer(activeZoneLayer);
  activeZoneLayer = L.polygon(s.coverage, {
    color: '#C8102E',
    fillColor: '#C8102E',
    fillOpacity: 0.18,
    weight: 2,
    dashArray: '6,4'
  }).addTo(map);

  // Fly to station
  map.flyTo([s.lat, s.lng], 12, { duration: 0.8 });

  // Populate panel
  document.getElementById('panel-name').textContent = s.name;
  document.getElementById('panel-number').textContent = s.number;

  const photo = document.getElementById('panel-photo');
  if (s.photo) {
    photo.innerHTML = `<img src="${s.photo}" alt="${s.name}" />`;
  } else {
    photo.innerHTML = `<div class="photo-placeholder">🚒</div>`;
  }

  document.getElementById('panel-info').innerHTML = `
    <div class="info-row">
      <div class="info-icon">📍</div>
      <div class="info-content"><label>Dirección</label><span>${s.address}</span></div>
    </div>
    <div class="info-row">
      <div class="info-icon">👨‍✈️</div>
      <div class="info-content"><label>Intendente / Jefe</label><span>${s.chief}</span></div>
    </div>
    <div class="info-row">
      <div class="info-icon">📞</div>
      <div class="info-content"><label>Contacto</label><span>${s.phone}</span></div>
    </div>
  `;

  renderUnits(s);
  document.getElementById('panel').classList.add('open');
}

function renderUnits(s) {
  const icons = { "Autobombas": "🚒", "Escaleras": "🪜", "Cisterneros": "🛢️", "Salvamento": "⛑️", "Rescate": "🚨", "default": "🔧" };
  const grid = document.getElementById('panel-units');
  grid.innerHTML = Object.entries(s.units).map(([k, v]) => `
    <div class="unit-card">
      <div class="unit-icon">${icons[k] || icons.default}</div>
      <div class="unit-info"><strong>${v}</strong><span>${k}</span></div>
    </div>
  `).join('');
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
  if (activeZoneLayer) { map.removeLayer(activeZoneLayer); activeZoneLayer = null; }
  if (activeStation) { markerMap[activeStation.id].setIcon(makeFireIcon(false)); activeStation = null; }
}

// ══════════════════════════════════════════
// EDIT MODE
// ══════════════════════════════════════════
function toggleEditMode() {
  editMode = !editMode;
  document.getElementById('edit-toolbar').classList.toggle('show', editMode);
  document.getElementById('btn-edit').classList.toggle('active', editMode);
  map.getContainer().style.cursor = editMode ? 'crosshair' : '';
  if (!editMode) setAddMode('station');
}

function setAddMode(mode) {
  addMode = mode;
  document.getElementById('tb-station').classList.toggle('active', mode === 'station');
  document.getElementById('tb-cistern').classList.toggle('active', mode === 'cistern');
}

function toggleCisternMode() {
  if (!editMode) toggleEditMode();
  setAddMode('cistern');
}

map.on('click', function(e) {
  if (!editMode) return;
  const { lat, lng } = e.latlng;

  if (addMode === 'cistern') {
    const owner = prompt('Propietario de la cisterna:');
    if (!owner) return;
    const volume = prompt('Capacidad (ej: 20,000 L):') || '—';
    const phone = prompt('Número de contacto:') || '—';
    const c = { id: 'c' + Date.now(), lat, lng, owner, volume, phone, note: 'Voluntaria' };
    cisterns.push(c);
    const m = L.marker([lat, lng], { icon: makeCisternIcon() }).addTo(map);
    m.bindPopup(`<div style="font-family:'Barlow',sans-serif">
      <strong style="color:#1565C0">💧 Cisterna</strong><br>
      <b>${owner}</b><br>${volume} — ${phone}
    </div>`);
  } else {
    const name = prompt('Nombre del cuerpo de bomberos:');
    if (!name) return;
    const address = prompt('Dirección:') || '—';
    const chief = prompt('Intendente / Jefe:') || '—';
    const phone = prompt('Teléfono:') || '—';
    const newId = stations.length + 1;
    const s = {
      id: newId, name, number: `Estación #${String(newId).padStart(2,'0')}`,
      address, chief, phone, lat, lng, photo: null,
      units: { "Autobombas": 0 },
      coverage: makeDefaultCoverage(lat, lng)
    };
    stations.push(s);
    const marker = L.marker([lat, lng], { icon: makeFireIcon() }).addTo(map);
    markerMap[newId] = marker;
    marker.on('click', () => selectStation(s));
    alert(`✅ Estación "${name}" añadida. Haz clic en ella para ver los detalles.`);
  }
});

function makeDefaultCoverage(lat, lng) {
  const d = 0.06;
  return [
    [lat+d, lng-d], [lat+d, lng+d],
    [lat-d, lng+d], [lat-d, lng-d], [lat+d, lng-d]
  ];
}

// ══════════════════════════════════════════
// EDIT UNITS MODAL
// ══════════════════════════════════════════
function openEditModal() {
  if (!activeStation) return;
  const s = activeStation;
  const fields = document.getElementById('modal-fields');
  const unitTypes = ["Autobombas", "Escaleras", "Cisterneros", "Salvamento", "Rescate", "Ambulancias", "Motobombas"];
  fields.innerHTML = unitTypes.map(u => `
    <div class="modal-field">
      <label>${u}</label>
      <input type="number" min="0" id="unit_${u}" value="${s.units[u] || 0}" placeholder="0" />
    </div>
  `).join('');
  document.getElementById('modal-overlay').classList.add('show');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('show');
}

function saveUnits() {
  if (!activeStation) return;
  const unitTypes = ["Autobombas", "Escaleras", "Cisterneros", "Salvamento", "Rescate", "Ambulancias", "Motobombas"];
  const newUnits = {};
  unitTypes.forEach(u => {
    const v = parseInt(document.getElementById(`unit_${u}`).value) || 0;
    if (v > 0) newUnits[u] = v;
  });
  activeStation.units = newUnits;
  renderUnits(activeStation);
  closeModal();
}

// Close modal on overlay click
document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
</script>
</body>
</html>
